name: .NET & Frontend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore Bmz.LabTests.slnx
    
    - name: Build
      run: dotnet build Bmz.LabTests.slnx --no-restore --configuration Release
    
  frontend-tests:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: cd frontend && npm ci
    
    - name: Run lint (TypeScript check)
      run: cd frontend && npx tsc --noEmit
    
    - name: Run tests
      run: cd frontend && npm run test:run
    
    - name: Build
      run: cd frontend && npm run build

  code-quality:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Check formatting
      run: dotnet format Bmz.LabTests.slnx --verify-no-changes --no-restore

  docker-build:
    runs-on: windows-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker images
      run: docker-compose build
      working-directory: .
    
    - name: Test Docker build
      run: docker-compose up -d
      working-directory: .
    
    - name: Stop containers
      run: docker-compose down
      working-directory: .
